version: '3.8'
services:
  jupyter:
    image: jupyter/scipy-notebook:latest
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/home/jovyan/work/notebooks
      - ./data:/home/jovyan/work/data
    environment:
      - JUPYTER_TOKEN=airbnb2026
    command: start-notebook.sh --NotebookApp.token='airbnb2026'
